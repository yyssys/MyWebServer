<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录失败</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #e8f0ff 0%, #bfd4ff 100%);
        }
        .panel {
            width: 420px;
            background: #fff;
            border-radius: 18px;
            padding: 36px 30px;
            box-shadow: 0 18px 40px rgba(42, 76, 145, 0.16);
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 14px;
            color: #2450a8;
        }
        p {
            color: #55657d;
            line-height: 1.7;
            margin-bottom: 22px;
        }
        a {
            display: inline-block;
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            color: #fff;
            background: #3b82f6;
        }
    </style>
</head>

<body>
    <div class="panel">
        <h1>登录失败</h1>
        <p>用户名不存在，或者密码不正确。请检查后重新登录。</p>
        <a href="log.html">返回登录页</a>
    </div>
</body>

</html>
