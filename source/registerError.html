<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册失败</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #fff2e2 0%, #ffd6b0 100%);
        }
        .panel {
            width: 420px;
            background: #fff;
            border-radius: 18px;
            padding: 36px 30px;
            box-shadow: 0 18px 40px rgba(124, 72, 18, 0.14);
            text-align: center;
        }
        h1 { font-size: 28px; margin-bottom: 14px; color: #9a4d07; }
        p { color: #735846; line-height: 1.7; margin-bottom: 22px; }
        a {
            display: inline-block;
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            color: #fff;
            background: #d97706;
        }
    </style>
</head>

<body>
    <div class="panel">
        <h1>注册失败</h1>
        <p>用户名已经存在，请换一个用户名后重试。</p>
        <a href="register.html">返回注册页</a>
    </div>
</body>

</html>
