<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }

        :root {
            --primary: #5b7cfa;
            --secondary: #7b4bb7;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --white: rgba(255, 255, 255, 0.92);
            --border: rgba(255, 255, 255, 0.25);
            --shadow: 0 20px 50px rgba(35, 39, 47, 0.18);
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.25), transparent 30%),
                radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.15), transparent 35%),
                linear-gradient(135deg, #5b7cfa 0%, #7b4bb7 45%, #512f9c 100%);
            display: flex;
            flex-direction: column;
            color: #fff;
            overflow: hidden;
        }

        a {
            text-decoration: none;
        }

        /* 顶部 */
        .header {
            height: 76px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 42px;
            position: relative;
            z-index: 2;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -24px);
            min-width: 280px;
            max-width: min(92vw, 420px);
            padding: 14px 18px;
            border-radius: 14px;
            background: rgba(191, 38, 59, 0.92);
            color: #fff;
            box-shadow: 0 18px 40px rgba(80, 13, 24, 0.28);
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.28s ease, transform 0.28s ease;
            z-index: 10;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .header-right {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.92);
        }

        /* 主区域 */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }

        .main::before,
        .main::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(20px);
            opacity: 0.28;
            z-index: 0;
        }

        .main::before {
            width: 260px;
            height: 260px;
            background: #ffffff;
            top: 10%;
            left: 10%;
        }

        .main::after {
            width: 220px;
            height: 220px;
            background: #d8b4fe;
            right: 12%;
            bottom: 8%;
        }

        .login-wrapper {
            width: 100%;
            max-width: 1040px;
            display: grid;
            grid-template-columns: 1.1fr 420px;
            gap: 28px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .intro {
            padding: 20px 20px 20px 10px;
        }

        .intro-tag {
            display: inline-block;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            font-size: 13px;
            margin-bottom: 22px;
            backdrop-filter: blur(10px);
        }

        .intro h1 {
            font-size: 48px;
            line-height: 1.2;
            margin-bottom: 18px;
            font-weight: 700;
        }

        .intro p {
            font-size: 16px;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.9);
            max-width: 520px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid var(--border);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 34px 30px 28px;
        }

        .login-box h2 {
            color: #fff;
            font-size: 28px;
            text-align: center;
            margin-bottom: 8px;
        }

        .login-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.82);
            font-size: 14px;
            margin-bottom: 28px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.88);
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            height: 50px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(255, 255, 255, 0.88);
            border-radius: 14px;
            padding: 0 16px;
            outline: none;
            font-size: 15px;
            color: var(--text-main);
            transition: all 0.25s ease;
        }

        .input-wrap input::placeholder {
            color: #9ca3af;
        }

        .input-wrap input:focus {
            border-color: rgba(91, 124, 250, 0.85);
            box-shadow: 0 0 0 4px rgba(91, 124, 250, 0.14);
            background: #fff;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 4px 0 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.88);
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .options a {
            color: #fff;
            opacity: 0.9;
        }

        .options a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ffffff 0%, #e9edff 100%);
            color: #4a50c9;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 10px 24px rgba(255, 255, 255, 0.18);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(255, 255, 255, 0.25);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.72);
            font-size: 13px;
            margin: 22px 0 18px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .extra {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.9;
        }

        .extra a {
            color: #fff;
            font-weight: 600;
        }

        .extra a:hover {
            text-decoration: underline;
        }

        /* 底部 */
        .footer {
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.82);
            padding: 18px 0;
            position: relative;
            z-index: 2;
        }

        @media (max-width: 900px) {
            .login-wrapper {
                grid-template-columns: 1fr;
                max-width: 460px;
            }

            .intro {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 0 18px;
                height: 64px;
            }

            .logo {
                font-size: 20px;
            }

            .header-right {
                display: none;
            }

            .main {
                padding: 18px;
            }

            .login-box {
                padding: 28px 20px 24px;
                border-radius: 20px;
            }

            .login-box h2 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

    <div id="login-toast" class="toast" role="alert" aria-live="assertive">
        用户名不存在或密码错误，请重新输入。
    </div>

    <header class="header">
        <div class="logo">C++ Learning Home</div>
        <div class="header-right">欢迎回来，开始你的学习之旅</div>
    </header>

    <main class="main">
        <div class="login-wrapper">
            <section class="intro">
                <div class="intro-tag">高效 · 简洁 · 现代</div>
                <h1>欢迎来到<br>学习管理平台</h1>
                <p>
                    在这里登录你的账号，继续课程学习、查看学习记录、管理个人资料，
                    让每一次登录都成为进步的新开始。
                </p>
            </section>

            <div class="login-box">
                <h2>用户登录</h2>
                <div class="login-subtitle">请输入账号信息以继续访问系统</div>

                <form action="2CGISQL.cgi" method="post">
                    <div class="input-group">
                        <label class="input-label">用户名</label>
                        <div class="input-wrap">
                            <input type="text" name="user" placeholder="请输入用户名" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label">登录密码</label>
                        <div class="input-wrap">
                            <input type="password" name="password" placeholder="请输入登录密码" required>
                        </div>
                    </div>

                    <div class="options">
                        <label>
                            <input type="checkbox">
                            记住我
                        </label>
                        <a href="forgot.html">忘记密码？</a>
                    </div>

                    <button type="submit" class="login-btn">立即登录</button>
                </form>

                <div class="divider">更多操作</div>

                <div class="extra">
                    还没有账号？
                    <a href="register.html">立即注册</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        © 2026 C++ Learning Home. All Rights Reserved.
    </footer>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            if (params.get("error") !== "1") {
                return;
            }

            const toast = document.getElementById("login-toast");
            if (!toast) {
                return;
            }

            toast.classList.add("show");
            window.setTimeout(function () {
                toast.classList.remove("show");
            }, 2600);

            if (window.history.replaceState) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        })();
    </script>

</body>

</html>
