<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #2f7f6d 0%, #63b58c 100%);
            color: #1c2b24;
            display: flex;
            flex-direction: column;
        }
        .header, .footer {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            color: #fff;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -24px);
            min-width: 280px;
            max-width: min(92vw, 420px);
            padding: 14px 18px;
            border-radius: 14px;
            background: rgba(191, 38, 59, 0.92);
            color: #fff;
            box-shadow: 0 18px 40px rgba(80, 13, 24, 0.28);
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.28s ease, transform 0.28s ease;
            z-index: 10;
        }
        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            width: 360px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 36px 30px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
        }
        .title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 26px;
        }
        .input-group { margin-bottom: 18px; }
        .input-group input {
            width: 100%;
            height: 46px;
            border: 1px solid #d7dfdb;
            border-radius: 10px;
            padding: 0 12px;
            font-size: 15px;
        }
        .submit-btn {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 10px;
            color: #fff;
            background: linear-gradient(90deg, #2f7f6d, #63b58c);
            font-size: 16px;
            cursor: pointer;
        }
        .extra {
            text-align: center;
            margin-top: 18px;
            color: #617068;
        }
        .extra a { color: #2f7f6d; text-decoration: none; }
    </style>
</head>

<body>
    <div id="register-toast" class="toast" role="alert" aria-live="assertive">
        用户名已存在，请更换后重新注册。
    </div>

    <div class="header">
        <div>C++</div>
        <a href="index.html" style="color:#fff;text-decoration:none;">返回首页</a>
    </div>

    <div class="main">
        <div class="card">
            <div class="title">创建账号</div>
            <form action="3CGISQL.cgi" method="post">
                <div class="input-group">
                    <input type="text" name="user" placeholder="用户名" required>
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="设置密码" required>
                </div>
                <button type="submit" class="submit-btn">注册</button>
            </form>
            <div class="extra">
                已有账号？<a href="login.html">去登录</a>
            </div>
        </div>
    </div>

    <div class="footer">© 2026 C++ Learning Home</div>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            if (params.get("error") !== "1") {
                return;
            }

            const toast = document.getElementById("register-toast");
            if (!toast) {
                return;
            }

            toast.classList.add("show");
            window.setTimeout(function () {
                toast.classList.remove("show");
            }, 2600);

            if (window.history.replaceState) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        })();
    </script>
</body>

</html>
